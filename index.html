<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 Kids Draw!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #fff9f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    user-select: none;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2rem;
    color: #ff6b6b;
    padding: 10px 0 6px;
    letter-spacing: 1px;
    text-shadow: 3px 3px 0 #ffd166;
  }

  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: white;
    border-radius: 30px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    margin-bottom: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .section-label {
    font-size: 0.7rem;
    font-weight: 700;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .colors {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .color-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 3px solid white;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  .color-btn:hover { transform: scale(1.2); }
  .color-btn.active {
    border: 3px solid #333;
    transform: scale(1.25);
    box-shadow: 0 3px 10px rgba(0,0,0,0.3);
  }

  .divider {
    width: 2px;
    height: 36px;
    background: #eee;
    border-radius: 2px;
  }

  .tool-btn {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    border: none;
    background: #f0f0f0;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.15s;
  }
  .tool-btn:hover { background: #e0e0e0; transform: scale(1.1); }
  .tool-btn.active { background: #ffd166; box-shadow: 0 2px 8px rgba(255,209,102,0.6); }

  #size-slider {
    -webkit-appearance: none;
    width: 80px;
    height: 8px;
    border-radius: 10px;
    background: linear-gradient(to right, #ff6b6b, #ffd166);
    outline: none;
    cursor: pointer;
  }
  #size-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: white;
    border: 3px solid #ff6b6b;
    cursor: pointer;
  }

  #size-preview {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #size-dot {
    background: #333;
    border-radius: 50%;
    transition: width 0.1s, height 0.1s;
  }

  #canvas-wrap {
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    border: 4px solid white;
    cursor: crosshair;
  }

  canvas { display: block; }

  #clear-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #ff6b6b;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 10px 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255,107,107,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #clear-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(255,107,107,0.5);
  }

  #save-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: #06d6a0;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 10px 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(6,214,160,0.4);
    transition: transform 0.15s;
  }
  #save-btn:hover { transform: scale(1.05); }
</style>
</head>
<body>

<h1>🎨 Kids Draw!</h1>

<div id="toolbar">
  <span class="section-label">Colors</span>
  <div class="colors" id="color-palette"></div>

  <div class="divider"></div>

  <span class="section-label">Tools</span>
  <button class="tool-btn active" id="btn-pen" title="Pen">✏️</button>
  <button class="tool-btn" id="btn-fill" title="Fill">🪣</button>
  <button class="tool-btn" id="btn-eraser" title="Eraser">🧼</button>

  <div class="divider"></div>

  <span class="section-label">Size</span>
  <input type="range" id="size-slider" min="2" max="60" value="8">
  <div id="size-preview"><div id="size-dot"></div></div>
</div>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<button id="clear-btn">🗑️ Clear</button>
<button id="save-btn">💾 Save</button>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const palette = document.getElementById('color-palette');
  const slider = document.getElementById('size-slider');
  const dot = document.getElementById('size-dot');

  // Canvas size
  const W = Math.min(window.innerWidth - 32, 800);
  const H = window.innerHeight - 210;
  canvas.width = W;
  canvas.height = H;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // Colors
  const COLORS = [
    '#222222','#ff6b6b','#ff9f43','#ffd166','#06d6a0',
    '#118ab2','#9b5de5','#f15bb5','#ffffff','#a8dadc',
    '#e76f51','#2a9d8f','#457b9d','#e9c46a','#f4a261'
  ];

  let currentColor = COLORS[0];
  let brushSize = 8;
  let tool = 'pen'; // pen | eraser | fill
  let drawing = false;
  let lastX = 0, lastY = 0;

  // Build palette
  COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'color-btn' + (c === currentColor ? ' active' : '');
    btn.style.background = c;
    if (c === '#ffffff') btn.style.border = '3px solid #ddd';
    btn.onclick = () => {
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentColor = c;
      if (tool === 'eraser') switchTool('pen');
    };
    palette.appendChild(btn);
  });

  // Tool buttons
  function switchTool(t) {
    tool = t;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + t).classList.add('active');
    canvas.style.cursor = t === 'fill' ? 'cell' : 'crosshair';
  }
  document.getElementById('btn-pen').onclick = () => switchTool('pen');
  document.getElementById('btn-eraser').onclick = () => switchTool('eraser');
  document.getElementById('btn-fill').onclick = () => switchTool('fill');

  // Brush size
  slider.oninput = () => {
    brushSize = +slider.value;
    const s = Math.min(brushSize, 24);
    dot.style.width = s + 'px';
    dot.style.height = s + 'px';
  };
  dot.style.width = brushSize + 'px';
  dot.style.height = brushSize + 'px';

  // Drawing
  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    if (e.touches) {
      return [e.touches[0].clientX - r.left, e.touches[0].clientY - r.top];
    }
    return [e.clientX - r.left, e.clientY - r.top];
  }

  function startDraw(e) {
    e.preventDefault();
    const [x, y] = getPos(e);
    if (tool === 'fill') { floodFill(Math.round(x), Math.round(y), currentColor); return; }
    drawing = true;
    [lastX, lastY] = [x, y];
    ctx.beginPath();
    ctx.arc(x, y, (tool === 'eraser' ? brushSize * 1.5 : brushSize) / 2, 0, Math.PI * 2);
    ctx.fillStyle = tool === 'eraser' ? '#ffffff' : currentColor;
    ctx.fill();
  }

  function draw(e) {
    if (!drawing) return;
    e.preventDefault();
    const [x, y] = getPos(e);
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(x, y);
    ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : currentColor;
    ctx.lineWidth = tool === 'eraser' ? brushSize * 1.5 : brushSize;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
    [lastX, lastY] = [x, y];
  }

  function endDraw() { drawing = false; }

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('touchend', endDraw);

  // Flood fill
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return [r, g, b, 255];
  }
  function colorsMatch(a, b, tol = 30) {
    return Math.abs(a[0]-b[0]) < tol && Math.abs(a[1]-b[1]) < tol && Math.abs(a[2]-b[2]) < tol;
  }
  function floodFill(startX, startY, fillColor) {
    const imgData = ctx.getImageData(0, 0, W, H);
    const data = imgData.data;
    const [fr, fg, fb, fa] = hexToRgb(fillColor);
    const idx = (startY * W + startX) * 4;
    const targetColor = [data[idx], data[idx+1], data[idx+2], data[idx+3]];
    if (colorsMatch(targetColor, [fr,fg,fb,fa], 5)) return;
    const stack = [[startX, startY]];
    const visited = new Uint8Array(W * H);
    while (stack.length) {
      const [cx, cy] = stack.pop();
      if (cx < 0 || cx >= W || cy < 0 || cy >= H) continue;
      const i = cy * W + cx;
      if (visited[i]) continue;
      const pi = i * 4;
      if (!colorsMatch([data[pi], data[pi+1], data[pi+2], data[pi+3]], targetColor)) continue;
      visited[i] = 1;
      data[pi] = fr; data[pi+1] = fg; data[pi+2] = fb; data[pi+3] = fa;
      stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
    ctx.putImageData(imgData, 0, 0);
  }

  // Clear
  document.getElementById('clear-btn').onclick = () => {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);
  };

  // Save
  document.getElementById('save-btn').onclick = () => {
    const a = document.createElement('a');
    a.download = 'my-drawing.png';
    a.href = canvas.toDataURL();
    a.click();
  };
</script>
</body>
</html>
